name: Project Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: mydb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@127.0.0.1:5432/mydb

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION || '24'}}

      - name: Check required secrets and vars
        run: |
          # Check build-time vars
          if [ -z "${{ vars.SERVER_DEPLOY_PATH }}" ]; then echo "❌ Missing secret: SERVER_DEPLOY_PATH"; exit 1; fi

          # Check deploy-time secrets
          if [ -z "${{ secrets.SERVER_HOST }}" ]; then echo "❌ Missing secret: SERVER_HOST"; exit 1; fi
          if [ -z "${{ secrets.SERVER_USER }}" ]; then echo "❌ Missing secret: SERVER_USER"; exit 1; fi
          if [ -z "${{ secrets.SERVER_SSH_KEY }}" ]; then echo "❌ Missing secret: SERVER_SSH_KEY"; exit 1; fi

          # Other Required Secrets
          if [ -z "${{ secrets.JWT_SECRET }}" ]; then echo "❌ Missing secret: JWT_SECRET"; exit 1; fi
          if [ -z "${{ secrets.ZDRIVE_KEY }}" ]; then echo "❌ Missing secret: ZDRIVE_KEY"; exit 1; fi
          if [ -z "${{ secrets.ZDRIVE_SECRET }}" ]; then echo "❌ Missing secret: ZDRIVE_SECRET"; exit 1; fi
          if [ -z "${{ vars.ZAUTH_KEY }}" ]; then echo "❌ Missing secret: ZAUTH_KEY"; exit 1; fi
          if [ -z "${{ secrets.ZAUTH_SECRET }}" ]; then echo "❌ Missing secret: ZAUTH_SECRET"; exit 1; fi
          if [ -z "${{ vars.ZDRIVE_ROOT }}" ]; then echo "❌ Missing secret: ZDRIVE_ROOT"; exit 1; fi

          if [ -z "${{ vars.SMTP_HOST }}" ]; then echo "❌ Missing secret: SMTP_HOST"; exit 1; fi
          if [ -z "${{ vars.SMTP_USER }}" ]; then echo "❌ Missing secret: SMTP_USER"; exit 1; fi
          if [ -z "${{ secrets.SMTP_PASSWORD }}" ]; then echo "❌ Missing secret: SMTP_PASSWORD"; exit 1; fi

          # Check required files
          if [ ! -f "ecosystem.config.js" ]; then echo "❌ Missing file: ecosystem.config.js"; exit 1; fi

        shell: bash

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client (if needed)
        run: npx prisma generate

      - name: Run Prisma Migrate (if needed)
        run: npx prisma migrate deploy

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_ZAUTH_KEY: ${{ vars.ZAUTH_KEY }}
          NEXT_PUBLIC_ZDRIVE_ROOT: ${{ vars.ZDRIVE_ROOT }}
          NEXT_PUBLIC_URL: ${{ vars.PUBLIC_URL }}

      - name: Deploy to Server (via SCP)
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: ".next,package.json,package-lock.json,public,ecosystem.config.js, prisma"
          target: ${{ vars.SERVER_DEPLOY_PATH }}

      - name: Run SSH Remote Commands (optional)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            cd ${{ vars.SERVER_DEPLOY_PATH }}
            npm install --omit=dev
            export DATABASE_URL=${{ secrets.DATABASE_URL }}
            export ZDRIVE_KEY=${{ secrets.ZDRIVE_KEY }}
            export ZDRIVE_SECRET=${{ secrets.ZDRIVE_SECRET }}
            export SMTP_HOST=${{ vars.SMTP_HOST }}
            export SMTP_USER=${{ vars.SMTP_USER }}
            export SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
            export JWT_SECRET=${{ secrets.JWT_SECRET }}
            export ZAUTH_SECRET=${{ secrets.ZAUTH_SECRET }}
            export NEXT_PUBLIC_ZAUTH_KEY=${{ vars.ZAUTH_KEY }}
            export NEXT_PUBLIC_URL=${{ vars.PUBLIC_URL }}
            npx prisma migrate deploy
            npx prisma generate
            pm2 reload ecosystem.config.js || pm2 start ecosystem.config.js
            pm2 save
