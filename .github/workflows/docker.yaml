name: Docker Build and Push

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false # Set to true and add login step if you have a registry
          tags: cartex-pro:latest
          build-args: |
            NEXT_PUBLIC_ZAUTH_KEY=${{ vars.ZAUTH_KEY }}
            NEXT_PUBLIC_URL=${{ vars.PUBLIC_URL }}
            NEXT_PUBLIC_ZDRIVE_ROOT=${{ vars.ZDRIVE_ROOT }}
